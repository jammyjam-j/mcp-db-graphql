version: '3.9'
services:
  db:
    image: postgres:16-alpine
    container_name: mcp_db
    environment:
      POSTGRES_USER: mcp_user
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: mcpdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp_app
    environment:
      DATABASE_URL: postgres://mcp_user:secretpassword@db:5432/mcpdb
      LOG_LEVEL: INFO
      ENVIRONMENT: production
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
volumes:
  pgdata:
networks:
  default:
    driver: bridge